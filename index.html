<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#121212;color:white;font-family:sans-serif;margin:0}
h2{text-align:center;color:#00e5ff}
input,select,button{padding:10px;margin:5px;width:95%;border-radius:8px;border:none}
.card{background:#1e1e1e;padding:10px;margin:5px;border-radius:8px}
.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);display:none;
align-items:center;justify-content:center;
font-size:20px;color:#00ff9c;
}
.cancel{background:#ff5252;color:white}
.admin{background:#ff9800;color:white}
</style>
</head>

<body>

<h2>官職予約システム</h2>

<input id="name" placeholder="名前">
<select id="alliance"></select>

<button onclick="adminLogin()">管理者ログイン</button>

<h3>通常予約</h3>
<select id="time"></select>
<button onclick="reserveSingle()">予約</button>

<h3>範囲予約</h3>
<select id="start"></select>
<select id="end"></select>
<button onclick="reserveRange()">範囲予約</button>

<div id="list"></div>

<div class="overlay" id="loading">送信中...</div>

<script>
const API="あなたのURL";

// 管理者
let isAdmin=false;
let adminPass="";

function adminLogin(){
const p=prompt("管理者パスワード");
if(p==="1232"){
isAdmin=true;
adminPass=p;
alert("管理者モードON");
}
}

// 同盟
const alliances=["GNt","RAK","mNt","WNK","OMG","SBR","AAA","ANA","KOA","MOF","Gao","bTQ","MPO","その他"];
const aSel=document.getElementById("alliance");

alliances.forEach(a=>{
let o=document.createElement("option");
o.value=o.text=a;
aSel.appendChild(o);
});

// 時間生成
function generateTimes(){
let times=[],h=9,m=0;
for(let i=0;i<=48;i++){
times.push(`${("0"+h).slice(-2)}:${("0"+m).slice(-2)}`);
m+=30;
if(m>=60){m=0;h++;}
if(h>=24)h=0;
}
return times;
}

const times=generateTimes();

// 通常予約
const timeSelect=document.getElementById("time");
for(let i=0;i<times.length-1;i++){
let t=`${times[i]}-${times[i+1]}`;
let o=document.createElement("option");
o.value=o.text=t;
timeSelect.appendChild(o);
}

// 範囲予約
["start","end"].forEach(id=>{
const el=document.getElementById(id);
times.forEach(t=>{
let o=document.createElement("option");
o.value=o.text=t;
el.appendChild(o);
});
});

// 初期値
document.getElementById("start").selectedIndex=0;
document.getElementById("end").selectedIndex=1;

// 通信（🔥ここが修正ポイント）
async function send(data){
  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },
    body:JSON.stringify(data)
  });
}

function showLoading(v){
document.getElementById("loading").style.display=v?"flex":"none";
}

// 通常予約
async function reserveSingle(){
showLoading(true);

await send({
type:"single",
time:document.getElementById("time").value,
name:document.getElementById("name").value,
alliance:document.getElementById("alliance").value
});

setTimeout(()=>{showLoading(false);load();},1200);
}

// 範囲予約
async function reserveRange(){
const start=document.getElementById("start").value;
const end=document.getElementById("end").value;

if(!start||!end){
alert("時間を選択してください");
return;
}

if(start>=end){
alert("終了時間は開始時間より後にしてください");
return;
}

showLoading(true);

await send({
type:"range",
start:start,
end:end,
name:document.getElementById("name").value,
alliance:document.getElementById("alliance").value
});

setTimeout(()=>{showLoading(false);load();},1200);
}

// 表示
async function load(){
const res=await fetch(API);
const data=await res.json();

const myName=document.getElementById("name").value;

let html="";

data.forEach(d=>{
let label=d.time || (d.start+"〜"+d.end);

html+=`<div class="card">
${label} ${d.name}
`;

if(d.name===myName){
html+=`<button class="cancel" onclick="cancel(${d.id})">キャンセル</button>`;
}

if(isAdmin){
html+=`<button class="admin" onclick="adminDelete(${d.id})">削除</button>`;
}

html+=`</div>`;
});

document.getElementById("list").innerHTML=html;
}

// キャンセル
async function cancel(id){
showLoading(true);
await send({action:"cancel",id});
setTimeout(()=>{showLoading(false);load();},800);
}

// 管理者削除
async function adminDelete(id){
showLoading(true);
await send({action:"admin_delete",id,password:adminPass});
setTimeout(()=>{showLoading(false);load();},800);
}

load();
</script>

</body>
</html>
