<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  color:white;
  font-family:"Trebuchet MS",sans-serif;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.1), transparent 40%),
    linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
body::before{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(3px);
}
#snow{position:fixed;width:100%;height:100%;pointer-events:none;}
.snowflake{
  position:absolute;
  top:-10px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation:fall linear infinite;
}
@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}

.logo{
  ...
  opacity:0.35;
  filter:
    drop-shadow(0 2px 4px rgba(0,0,0,0.3))
    brightness(1.1);
}

.container{position:relative;z-index:3;padding:10px;}

h2{text-align:center;color:#e0f7fa;text-shadow:0 1px 4px rgba(0,0,0,0.4);}

.inputRow{display:flex;gap:5px;}
.inputRow input{flex:1;padding:8px;}

input,select,button{margin:5px 0;border-radius:10px;border:none;}

select,button{
  padding:10px;
  width:100%;
}

button{
  background:#263238;
  color:white;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
}

button:not(.ready){
  background:#555;
  color:#aaa;
}

button.ready{
  background:#00e5ff;
  color:black;
  box-shadow:0 0 10px #00e5ff;
}

/* ★トグルON */
button.active{
  background:#00e5ff;
  color:black;
  box-shadow:0 0 10px #00e5ff, 0 0 20px rgba(0,229,255,0.6);
}

.card{
  background:rgba(0,0,0,0.5);
  border-radius:12px;
  padding:10px;
  margin:8px 0;
}

.row{
  display:flex;
  justify-content:space-between;
}

.single{border-left:4px solid #4fc3f7;}
.range{border-left:4px solid #9575cd;}

.time{font-weight:bold;}

.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.85);
  color:white;
  font-size:22px;
  z-index:9999; /* ★最前面 */
  animation:fadeIn 0.2s;
  z-index:9999;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
  
}
button.active{
  background:#00e5ff;
  color:black;
  box-shadow:0 0 10px #00e5ff, 0 0 20px rgba(0,229,255,0.6);
}
</style>
</head>

<body>

<div id="snow"></div>
<img src="unnamed.png" class="logo">

<div class="container">

<h2>2743官職予約</h2>

<div class="inputRow">
  <input id="name" placeholder="名前">
  <input id="accel" type="number" placeholder="加速(日)">
</div>

<select id="alliance"></select>

<button id="toggleBtn">空き枠のみ表示：OFF</button>

<h3>時間指定予約</h3>
<select id="time"></select>
<button id="singleBtn">予約</button>

<h3>範囲指定予約（最大2つ）</h3>

<div class="card">
① <select class="start"></select> 〜 <select class="end"></select>
</div>

<div class="card">
②（任意）
<select class="start">
<option value="">未選択</option>
</select>
〜
<select class="end">
<option value="">未選択</option>
</select>
</div>

<button id="rangeBtn">範囲指定予約</button>

<h3>予約リスト</h3>
<div id="list"></div>

</div>

<div class="overlay" id="loading">送信中...</div>

<script>
const API="https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";

let currentData=[];
let showOnlyFree=false;

const nameEl=document.getElementById("name");
const accelEl=document.getElementById("accel");
const allianceEl=document.getElementById("alliance");
const timeEl=document.getElementById("time");
const list=document.getElementById("list");
const loading=document.getElementById("loading");

const singleBtn=document.getElementById("singleBtn");
const rangeBtn=document.getElementById("rangeBtn");
const toggleBtn=document.getElementById("toggleBtn");

const startEls=document.querySelectorAll(".start");
const endEls=document.querySelectorAll(".end");

["GNt","RAK","mNt","WNK","SBR","OMG","AAA","KOA","ANA","MOF","Gao","bTq","MPO","その他"]
.forEach(a=>allianceEl.add(new Option(a,a)));

function generateTimes(){
let h=9,m=0,t=[];
for(let i=0;i<48;i++){
t.push(("0"+h).slice(-2)+":"+("0"+m).slice(-2));
m+=30;if(m>=60){m=0;h++}if(h>=24)h-=24;
}
return t;
}
const times=generateTimes();

function getUsed(){
return currentData.map(d=>d.time);
}

/* ===== トグル ===== */
toggleBtn.onclick = ()=>{
showOnlyFree=!showOnlyFree;

toggleBtn.textContent="空き枠のみ表示："+(showOnlyFree?"ON":"OFF");

// ★これ追加（光る）
toggleBtn.classList.toggle("active", showOnlyFree);

// ★これ重要（まとめて更新）
updateAll();
};
/* ===== 時間保持 ===== */
function updateTimeOptions(){
const selected = timeEl.value;
timeEl.innerHTML="";
const used=getUsed();

times.forEach(v=>{
if(showOnlyFree && used.includes(v)) return;
timeEl.add(new Option(v,v));
});

if(selected) timeEl.value = selected;
}

/* ===== 範囲 ===== */
function updateRangeOptions(){
const used=getUsed();

startEls.forEach((s,i)=>{
  const selectedStart = s.value;
  const selectedEnd = endEls[i].value;

  s.innerHTML="";

  if(i===1){
    s.add(new Option("未選択",""));
  }

  times.forEach(t=>{
    if(showOnlyFree && used.includes(t)) return;
    s.add(new Option(t,t));
  });

  if(selectedStart) s.value = selectedStart;

  updateEnd(s,endEls[i]);

  if(selectedEnd) endEls[i].value = selectedEnd;
});
}

function updateEnd(startSel,endSel){
if(!startSel.value){
endSel.innerHTML="";
endSel.add(new Option("未選択",""));
return;
}
endSel.innerHTML="";
let idx=times.indexOf(startSel.value);
for(let i=idx+1;i<times.length;i++){
endSel.add(new Option(times[i],times[i]));
}
}

/* ===== ボタン状態 ===== */
function checkReady(){
const used=getUsed();

singleBtn.classList.toggle("ready",
  nameEl.value.trim() &&
  accelEl.value>0 &&
  timeEl.value &&
  !used.includes(timeEl.value)
);

let hasRange=false,hasFree=false;

startEls.forEach((s,i)=>{
if(s.value && endEls[i].value){
hasRange=true;
const sIdx=times.indexOf(s.value);
const eIdx=times.indexOf(endEls[i].value);
for(let j=sIdx;j<eIdx;j++){
if(!used.includes(times[j])){
hasFree=true;break;
}
}
}
});

rangeBtn.classList.toggle("ready",
  nameEl.value.trim() &&
  accelEl.value>0 &&
  hasRange && hasFree
);
}

/* ===== 演出 ===== */
function showLoading(v){
loading.style.display=v?"flex":"none";
loading.innerText="送信中...";
loading.style.color="white";
}

function showSuccess(){
loading.innerText="予約完了！";
loading.style.color="#00e676";
}

/* ===== 予約処理 ===== */
singleBtn.onclick=async ()=>{
if(!singleBtn.classList.contains("ready")) return;

showLoading(true);

const res=await fetch(API,{
method:"POST",
body:new URLSearchParams({
data:JSON.stringify({
type:"single",
time:timeEl.value,
name:nameEl.value,
alliance:allianceEl.value,
accel:accelEl.value
})
})
});

const text=await res.text();
console.log("レスポンス:", text);

if(text!=="ok"){
showLoading(false);alert("予約失敗");return;
}

showSuccess();
setTimeout(()=>{showLoading(false);load();},1200);
};

rangeBtn.onclick=async ()=>{
if(!rangeBtn.classList.contains("ready")) return;

let ranges=[];
startEls.forEach((s,i)=>{
if(s.value && endEls[i].value){
ranges.push({start:s.value,end:endEls[i].value});
}
});

showLoading(true);

const res=await fetch(API,{
method:"POST",
body:new URLSearchParams({
data:JSON.stringify({
type:"range",
ranges:ranges,
name:nameEl.value,
alliance:allianceEl.value,
accel:accelEl.value
})
})
});

const text=await res.text();

if(text!=="ok"){
showLoading(false);alert("予約失敗");return;
}

showSuccess();
setTimeout(()=>{showLoading(false);load();},1200);
};

/* ===== 雪 ===== */
function createSnow(){
const s=document.getElementById("snow");
for(let i=0;i<40;i++){
let e=document.createElement("div");
e.className="snowflake";
e.style.left=Math.random()*100+"vw";
e.style.width=e.style.height=(Math.random()*4+2)+"px";
e.style.animationDuration=(Math.random()*5+5)+"s";
s.appendChild(e);
}
}

/* ===== load ===== */
async function load(){
const res=await fetch(API);
const data=await res.json();
currentData=data;

list.innerHTML=data.map(d=>`
<div class="card row ${d.type==="range"?"range":"single"}">
<div class="time">${d.time||"調整中"}</div>
<div>${d.name||""}</div>
</div>`).join("");

updateAll();
checkReady();
}

setInterval(load,3000);
setInterval(checkReady,300);

createSnow();
load();
function updateAll(){
  updateTimeOptions();
  updateRangeOptions();
}
</script>

</body>
</html>
