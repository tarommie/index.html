<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===== 背景（氷＋霧） ===== */
body{
  margin:0;
  color:white;
  font-family:"Trebuchet MS",sans-serif;

  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.1), transparent 40%),
    linear-gradient(135deg,#0f2027,#203a43,#2c5364);

  background-attachment:fixed;
}

/* 霧 */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(3px);
  z-index:-1;
}

/* ❄️ 雪レイヤー */
#snow{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}

.snowflake{
  position:absolute;
  top:-10px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation:fall linear infinite;
}

/* ❄️ 落下＋横揺れ */
@keyframes fall{
  0%{transform:translateY(0) translateX(0);}
  50%{transform:translateY(50vh) translateX(20px);}
  100%{transform:translateY(110vh) translateX(-20px);}
}

/* UI前面に */
body > *:not(#snow){
  position:relative;
  z-index:1;
}

/* タイトル */
h2{
  text-align:center;
  color:#e0f7fa;
  text-shadow:0 0 10px #00e5ff,0 0 20px #00e5ff;
}

/* 入力 */
input,select,button{
  padding:10px;
  margin:5px;
  width:95%;
  border-radius:10px;
  border:none;
}

/* ボタン */
button{
  background:linear-gradient(135deg,#263238,#37474f);
  color:white;
  box-shadow:0 0 5px rgba(0,229,255,0.3);
}

button:hover{
  background:#00e5ff;
  color:black;
}

button:disabled{
  background:#555;
  color:#aaa;
}

/* カード */
.card{
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(6px);
  border-radius:12px;
  padding:10px;
  margin:8px;
  box-shadow:0 0 10px rgba(0,229,255,0.2);
}

.free{border-left:5px solid #00e676}
.full{border-left:5px solid #ff1744}
.range{border-left:5px solid #2979ff}

.mine{
  border:2px solid #00e5ff;
  box-shadow:0 0 15px #00e5ff;
}

.small{
  font-size:12px;
  color:#80d8ff;
}

.toggle{
  background:#263238;
}
.toggle.active{
  background:#00e5ff;
  color:black;
}

/* ローディング */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
font-size:20px;
color:#00e5ff;
}

</style>
</head>

<body>

<h2>官職予約システム</h2>

<input id="name" placeholder="名前">
<select id="alliance"></select>

<button id="toggleBtn" class="toggle">空きのみ表示：OFF</button>

<h3>通常予約</h3>
<select id="time"></select>
<button id="singleBtn">予約</button>

<h3>範囲予約</h3>
<select id="start"></select>
<select id="end"></select>
<button id="previewBtn">配置プレビュー</button>
<button id="rangeBtn">範囲予約</button>

<div id="preview"></div>
<div id="list"></div>

<div class="overlay" id="loading">送信中...</div>

<!-- ❄️ 雪 -->
<div id="snow"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";

let currentData=[];
let lastDataString="";
let showOnlyFree=false;

// DOM
const nameEl=document.getElementById("name");
const allianceEl=document.getElementById("alliance");
const timeEl=document.getElementById("time");
const startEl=document.getElementById("start");
const endEl=document.getElementById("end");
const list=document.getElementById("list");
const preview=document.getElementById("preview");
const loading=document.getElementById("loading");
const toggleBtn=document.getElementById("toggleBtn");
const singleBtn=document.getElementById("singleBtn");
const rangeBtn=document.getElementById("rangeBtn");
const previewBtn=document.getElementById("previewBtn");

// 同盟
const alliances=[
"GNt","RAK","mNt","WNK","SBR","OMG","AAA",
"KOA","ANA","MOF","Gao","bTq","MPO","その他"
];
alliances.forEach(a=>allianceEl.add(new Option(a,a)));

// 時間
function generateTimes(){
let h=9,m=0,t=[];
for(let i=0;i<48;i++){
t.push(("0"+h).slice(-2)+":"+("0"+m).slice(-2));
m+=30;if(m>=60){m=0;h++}if(h>=24)h-=24;
}
return t;
}
const times=generateTimes();

// ボタン制御
function updateButtons(){
const hasName=nameEl.value.trim()!=="";
singleBtn.disabled=!hasName;
rangeBtn.disabled=!hasName;
}

// 使用枠
function getUsedSlots(){
return currentData
.filter(d=>d.time && d.time.includes("-"))
.map(d=>d.time.split("-")[0]);
}

// 通常
function updateTimeOptions(){
const used=getUsedSlots();
timeEl.innerHTML="";
times.forEach((v,i)=>{
const slot=v+"-"+times[(i+1)%48];
if(showOnlyFree && used.includes(v)) return;
timeEl.add(new Option(slot.replace("-", "〜"), slot));
});
}

// 範囲制限
function updateEndOptions(){
const startIdx=times.indexOf(startEl.value);
endEl.innerHTML="";
for(let i=startIdx+1;i<times.length;i++){
endEl.add(new Option("〜"+times[i], times[i]));
}
}

// トグル
toggleBtn.onclick=()=>{
showOnlyFree=!showOnlyFree;
toggleBtn.textContent="空きのみ表示："+(showOnlyFree?"ON":"OFF");
toggleBtn.classList.toggle("active",showOnlyFree);
updateTimeOptions();
};

// プレビュー
previewBtn.onclick=()=>{
const startIdx=times.indexOf(startEl.value);
const endIdx=times.indexOf(endEl.value);

if(startIdx>=endIdx){
preview.innerHTML="<div class='card'>❌ 有効な時間を選択してください</div>";
return;
}

const used=getUsedSlots();
let html="<div class='card'>配置プレビュー<br>";
let free=[];

for(let i=startIdx;i<endIdx;i++){
const s=times[i];
const ok=!used.includes(s);
html+=`${s} → ${ok?"空き":"満席"}<br>`;
if(ok) free.push(s);
}

html+=free.length
? `<div class="small">候補: ${free.join(" / ")}</div>`
: `<div class="small">空きなし</div>`;

preview.innerHTML=html+"</div>";
};

// 予約
singleBtn.onclick=async ()=>{
if(currentData.some(d=>d.time===timeEl.value))return alert("満席");

showLoading(true);

await fetch(API,{
method:"POST",mode:"no-cors",
body:JSON.stringify({
type:"single",time:timeEl.value,name:nameEl.value,alliance:allianceEl.value
})
});

setTimeout(()=>{showLoading(false);load(true)},1200);
};

rangeBtn.onclick=async ()=>{
const startIdx=times.indexOf(startEl.value);
const endIdx=times.indexOf(endEl.value);

if(startIdx>=endIdx){
return alert("有効な時間を選択してください");
}

showLoading(true);

await fetch(API,{
method:"POST",mode:"no-cors",
body:JSON.stringify({
type:"range",start:startEl.value,end:endEl.value,
name:nameEl.value,alliance:allianceEl.value
})
});

setTimeout(()=>{showLoading(false);load(true)},1200);
};

// 表示
async function load(force=false){
const res=await fetch(API);
const text=await res.text();
if(!text)return;

const data=JSON.parse(text);

if(!force && JSON.stringify(data)===lastDataString)return;
lastDataString=JSON.stringify(data);
currentData=data;

const used=getUsedSlots();
const my=nameEl.value;

const html=data.map(d=>{
const isRange=d.start && d.end;

let isFull=false;
if(d.time){
const s=d.time.split("-")[0];
isFull=used.includes(s);
}

const isMine=d.name===my;

let display=isRange
? `🟦 ${d.start}〜${d.end}<br><span class="small">${d.alliance}</span>`
: `${(d.time||"").replace("-", "〜")}<br><span class="small">${d.alliance}</span>`;

return `<div class="card ${isFull?"full":"free"} ${isRange?"range":""} ${isMine?"mine":""}">
${display} ${d.name||""}
</div>`;
}).join("");

list.innerHTML=html;
updateTimeOptions();
}

function showLoading(v){
loading.style.display=v?"flex":"none";
}

// ❄️ 雪生成
function createSnow(){
const snowContainer=document.getElementById("snow");

for(let i=0;i<50;i++){
const snow=document.createElement("div");
snow.className="snowflake";

const size=Math.random()*4+2;
snow.style.width=size+"px";
snow.style.height=size+"px";

snow.style.left=Math.random()*100+"vw";
snow.style.animationDuration=(Math.random()*5+5)+"s";
snow.style.opacity=Math.random();

snowContainer.appendChild(snow);
}
}

// 初期化
(function(){
times.forEach(v=>{
startEl.add(new Option(v+"〜", v));
});
updateEndOptions();

startEl.addEventListener("change", updateEndOptions);
nameEl.addEventListener("input", updateButtons);

updateButtons();
createSnow();
})();

load();
setInterval(load,5000);

</script>
</body>
</html>
