<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#121212;color:white;font-family:sans-serif;margin:0}
h2{text-align:center;color:#00e5ff}
input,select,button{padding:10px;margin:5px;width:95%;border-radius:8px;border:none}
.card{background:#1e1e1e;padding:10px;margin:5px;border-radius:8px}
.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);display:none;
align-items:center;justify-content:center;
font-size:20px;color:#00ff9c;
}
.slot{font-size:12px;color:#aaa}
.auto{color:#00ff9c;font-size:13px}
</style>
</head>

<body>

<h2>官職予約システム</h2>

<input id="name" placeholder="名前">
<select id="alliance"></select>

<h3>通常予約</h3>
<select id="time"></select>
<button onclick="reserveSingle()">予約</button>

<h3>範囲予約</h3>
<select id="start"></select>
<select id="end"></select>
<button onclick="previewRange()">配置プレビュー</button>
<button onclick="reserveRange()">範囲予約</button>

<div id="preview"></div>
<div id="list"></div>

<div class="overlay" id="loading">送信中...</div>

<script>
const API="https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";

let currentData = [];
let lastDataString = "";

// ===== 同盟 =====
const alliances=["GNt","RAK","mNt","WNK","OMG","SBR","AAA","ANA","KOA","MOF","Gao","bTQ","MPO","その他"];
const aSel=document.getElementById("alliance");

alliances.forEach(a=>{
  let o=document.createElement("option");
  o.value=o.text=a;
  aSel.appendChild(o);
});

// ===== 時間処理 =====
function timeToMinutes(t){
  const [h,m] = t.split(":").map(Number);
  let total = h*60+m;
  if(h<9) total+=1440;
  return total;
}

function getSlots(start,end){
  let arr=[];
  let cur=timeToMinutes(start);
  const endMin=timeToMinutes(end);

  while(cur<endMin){
    const h=Math.floor(cur/60)%24;
    const m=cur%60;
    arr.push(("0"+h).slice(-2)+":"+("0"+m).slice(-2));
    cur+=30;
  }
  return arr;
}

// ===== 使用済み =====
function getUsedSlots(){
  return currentData
    .filter(d => d.time)
    .map(d => d.time.split("-")[0]);
}

// ===== プレビュー =====
function previewRange(){
  const start=document.getElementById("start").value;
  const end=document.getElementById("end").value;

  const slots=getSlots(start,end);
  const used=getUsedSlots();

  let html="<div class='card'>配置プレビュー<br>";

  let freeSlots=[];

  slots.forEach(s=>{
    const isFree = !used.includes(s);
    html+=`${s} → ${isFree ? "空き" : "満席"}<br>`;
    if(isFree) freeSlots.push(s);
  });

  if(freeSlots.length > 0){
    html+=`<div class="auto">👉 配置候補: ${freeSlots.join(" / ")}</div>`;
  }else{
    html+=`<div class="auto">❌ 空きなし</div>`;
  }

  html+="</div>";

  document.getElementById("preview").innerHTML=html;
}

// ===== 通常予約 =====
async function reserveSingle(){
const name=document.getElementById("name").value.trim();
const time=document.getElementById("time").value;

if(!name){
  alert("名前を入力してください");
  return;
}

if(currentData.some(d => d.time === time)){
  alert("この時間は満席です！");
  return;
}

showLoading(true);

await fetch(API,{
  method:"POST",
  mode:"no-cors",
  body:JSON.stringify({
    type:"single",
    time,
    name,
    alliance:document.getElementById("alliance").value
  })
});

setTimeout(()=>{
  showLoading(false);
  load(true); // 強制更新
},1500);
}

// ===== 範囲予約 =====
async function reserveRange(){
const name=document.getElementById("name").value.trim();
const start=document.getElementById("start").value;
const end=document.getElementById("end").value;

if(!name){
  alert("名前を入力してください");
  return;
}

if(timeToMinutes(start) >= timeToMinutes(end)){
  alert("時間が不正です");
  return;
}

const slots=getSlots(start,end);
const used=getUsedSlots();

const target=slots.find(s => !used.includes(s));

if(!target){
  alert("この時間帯はすべて満席です！");
  return;
}

showLoading(true);

await fetch(API,{
  method:"POST",
  mode:"no-cors",
  body:JSON.stringify({
    type:"range",
    start,
    end,
    name,
    alliance:document.getElementById("alliance").value
  })
});

setTimeout(()=>{
  showLoading(false);
  load(true); // 強制更新
},1500);
}

// ===== 表示（差分更新）=====
async function load(force=false){
const res=await fetch(API);
const data=await res.json();

const newDataString = JSON.stringify(data);

// 🔥 差分チェック
if(!force && newDataString === lastDataString){
  return;
}

lastDataString = newDataString;
currentData = data;

const used=getUsedSlots();

let html="";

data.forEach(d=>{
let label=d.time || (d.start+"〜"+d.end);

let slotInfo="";
if(d.time){
  const s=d.time.split("-")[0];
  slotInfo=`<div class="slot">${used.includes(s)?"満席":"空き"}</div>`;
}

html+=`<div class="card">
${label} ${d.name} (${d.alliance||""})
${slotInfo}
</div>`;
});

document.getElementById("list").innerHTML=html;
}

// ===== UI =====
function showLoading(v){
document.getElementById("loading").style.display=v?"flex":"none";
}

// ===== 初期化 =====
function init(){
let h=9,m=0,times=[];
for(let i=0;i<48;i++){
times.push(("0"+h).slice(-2)+":"+("0"+m).slice(-2));
m+=30;if(m>=60){m=0;h++}if(h>=24)h-=24;
}

const tSel=document.getElementById("time");
times.forEach((t,i)=>{
let next=times[(i+1)%times.length];
tSel.add(new Option(t+"-"+next,t+"-"+next));
});

["start","end"].forEach(id=>{
const el=document.getElementById(id);
times.forEach(t=>el.add(new Option(t,t)));
});
}

init();
load();

// 🔥 リアルタイム更新（差分のみ反映）
setInterval(load, 5000);

</script>

</body>
</html>
