<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  color:white;
  font-family:"Trebuchet MS",sans-serif;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.1), transparent 40%),
    linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

body::before{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(3px);
  z-index:0;
}

#snow{
  position:fixed;
  width:100%;height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}

.snowflake{
  position:absolute;
  top:-10px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(0) translateX(0);}
  50%{transform:translateY(50vh) translateX(15px);}
  100%{transform:translateY(110vh) translateX(-15px);}
}

.container{position:relative;z-index:2;}

h2{text-align:center;color:#e0f7fa;text-shadow:0 0 10px #00e5ff;}

input,select,button{
  padding:10px;margin:5px;width:95%;
  border-radius:10px;border:none;
}

button{background:#263238;color:white;}
button:hover{background:#00e5ff;color:black;}
button:disabled{background:#555;color:#aaa;}

.card{
  background:rgba(0,0,0,0.5);
  border-radius:12px;
  padding:10px;margin:8px;
}

.toggle.active{background:#00e5ff;color:black;}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
font-size:20px;
z-index:9999;
}
</style>
</head>

<body>

<div id="snow"></div>

<div class="container">

<h2>官職予約システム</h2>

<input id="name" placeholder="名前">
<select id="alliance"></select>

<button id="toggleBtn" class="toggle">空きのみ表示：OFF</button>

<h3>通常予約</h3>
<select id="time"></select>
<button id="singleBtn">予約</button>

<h3>範囲予約</h3>
<select id="start"></select>
<select id="end"></select>
<button id="rangeBtn">範囲予約</button>

<div id="list"></div>

</div>

<div class="overlay" id="loading">
  <span id="loadingText">送信中...</span>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";

let currentData=[];
let showOnlyFree=false;

// DOM
const nameEl=document.getElementById("name");
const allianceEl=document.getElementById("alliance");
const timeEl=document.getElementById("time");
const startEl=document.getElementById("start");
const endEl=document.getElementById("end");
const list=document.getElementById("list");
const loading=document.getElementById("loading");
const loadingText=document.getElementById("loadingText");
const toggleBtn=document.getElementById("toggleBtn");

// 同盟
const alliances=["GNt","RAK","mNt","WNK","SBR","OMG","AAA","KOA","ANA","MOF","Gao","bTq","MPO","その他"];
alliances.forEach(a=>allianceEl.add(new Option(a,a)));

// ローディング
function showLoading(v){
loading.style.display=v?"flex":"none";
loadingText.textContent="送信中...";
loadingText.style.color="white";
}

function showSuccess(){
loadingText.textContent="予約成功！";
loadingText.style.color="#00e676";
}

// 時間生成
function generateTimes(){
let h=9,m=0,t=[];
for(let i=0;i<48;i++){
t.push(("0"+h).slice(-2)+":"+("0"+m).slice(-2));
m+=30;if(m>=60){m=0;h++}if(h>=24)h-=24;
}
return t;
}
const times=generateTimes();

// 使用枠
function getUsedSlots(){
return currentData
.filter(d=>d.time)
.map(d=>d.time.split("-")[0]);
}

// 通常枠更新
function updateTimeOptions(){
const used=getUsedSlots();
timeEl.innerHTML="";

times.forEach((v,i)=>{
const slot=v+"-"+times[(i+1)%48];

if(showOnlyFree && used.includes(v)) return;

timeEl.add(new Option(slot.replace("-","〜"),slot));
});
}

// 範囲
times.forEach(v=>startEl.add(new Option(v,v)));

function updateEnd(){
endEl.innerHTML="";
let idx=times.indexOf(startEl.value);
for(let i=idx+1;i<times.length;i++){
endEl.add(new Option(times[i],times[i]));
}
}
startEl.onchange=updateEnd;
updateEnd();

// トグル
toggleBtn.onclick=()=>{
showOnlyFree=!showOnlyFree;
toggleBtn.textContent="空きのみ表示："+(showOnlyFree?"ON":"OFF");
toggleBtn.classList.toggle("active",showOnlyFree);
updateTimeOptions();
};

// ===== 通常予約 =====
document.getElementById("singleBtn").onclick=async ()=>{

if(currentData.some(d=>d.time===timeEl.value)){
  alert("満席");
  return;
}

showLoading(true);

await fetch(API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"single",
time:timeEl.value,
name:nameEl.value,
alliance:allianceEl.value
})
});

showSuccess();

setTimeout(()=>{
showLoading(false);
load();
},1500);
};

// ===== 範囲予約 =====
document.getElementById("rangeBtn").onclick=async ()=>{

const startIdx=times.indexOf(startEl.value);
const endIdx=times.indexOf(endEl.value);

if(startIdx>=endIdx){
  alert("有効な時間を選択してください");
  return;
}

const used=getUsedSlots();
let hasFree=false;

for(let i=startIdx;i<endIdx;i++){
if(!used.includes(times[i])){
  hasFree=true;
  break;
}
}

if(!hasFree){
  alert("空き枠がありません");
  return;
}

showLoading(true);

await fetch(API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
type:"range",
start:startEl.value,
end:endEl.value,
name:nameEl.value,
alliance:allianceEl.value
})
});

showSuccess();

setTimeout(()=>{
showLoading(false);
load();
},1500);
};

// ===== 表示（🔥ソート追加）=====
async function load(){
const res=await fetch(API);
const data=await res.json();

// 🔥 時間順ソート
data.sort((a,b)=>{
  const ta = a.time ? a.time.split("-")[0] : a.start;
  const tb = b.time ? b.time.split("-")[0] : b.start;
  return times.indexOf(ta) - times.indexOf(tb);
});

currentData=data;

list.innerHTML=data.map(d=>{
let txt=d.time
  ? d.time.replace("-","〜")
  : `${d.start}〜${d.end}`;

return `<div class="card">${txt} ${d.name||""}</div>`;
}).join("");

updateTimeOptions();
}

// ❄️ 雪
function createSnow(){
const s=document.getElementById("snow");
for(let i=0;i<50;i++){
let e=document.createElement("div");
e.className="snowflake";
e.style.left=Math.random()*100+"vw";
e.style.width=e.style.height=(Math.random()*4+2)+"px";
e.style.animationDuration=(Math.random()*5+5)+"s";
e.style.opacity=Math.random();
s.appendChild(e);
}
}

// 初期化
createSnow();
load();

</script>
</body>
</html>
