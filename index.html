<!DOCTYPE html>
<html>
<head>
 <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K2MC9P9VF7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-K2MC9P9VF7');
</script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  color:white;
  font-family:"Trebuchet MS",sans-serif;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.1), transparent 40%),
    linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
body::before{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(3px);
}
#snow{position:fixed;width:100%;height:100%;pointer-events:none;}
.snowflake{
  position:absolute;
  top:-60px;
  animation:fall linear infinite;
  pointer-events:none;
  filter:drop-shadow(0 0 2px rgba(255,255,255,0.6));
}
@keyframes fall{
  0%{
    transform:translateY(0) translateX(0) rotate(0deg);
    opacity:0;
  }
  5%{opacity:1;}
  90%{opacity:0.7;}
  100%{
    transform:translateY(110vh) translateX(var(--drift)) rotate(var(--spin));
    opacity:0;
  }
}

.container{position:relative;z-index:3;padding:10px;}

h2{
  text-align:center;
  color:#e0f7fa;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
}

h3{
  margin:12px 0 4px;
  font-size:14px;
  color:#90caf9;
  letter-spacing:0.5px;
}

/* input / select 共通：ダークテーマに合わせる */
input, select{
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
  padding:8px 10px;
  margin:4px 0;
  width:100%;
  box-sizing:border-box;
  font-family:"Trebuchet MS",sans-serif;
  font-size:14px;
}
input::placeholder{color:rgba(255,255,255,0.4);}
select option{background:#1c3140;color:white;}
input:focus, select:focus{
  outline:none;
  border-color:rgba(0,229,255,0.5);
}

button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#555;
  color:#aaa;
  margin:5px 0;
  font-family:"Trebuchet MS",sans-serif;
  font-size:14px;
  transition:0.2s;
  cursor:pointer;
}
/* ボタンの光を抑える */
button.ready{
  background:#00e5ff;
  color:black;
  box-shadow:0 0 6px rgba(0,229,255,0.4);  /* 弱めに */
}
button.active{
  background:#00e5ff;
  color:black;
  box-shadow:0 0 8px rgba(0,229,255,0.5);  /* 弱めに */
}

/* カード：全セクション共通 */
.card{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px 12px;
  margin:6px 0;
}
.card input, .card select{margin:4px 0;}

.inputRow{display:flex;gap:8px;}
.inputRow input{flex:1;}

/* 予約リスト */
.list-card{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px 14px;
  margin:6px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.list-card.single{border-left:4px solid #4fc3f7;}
.list-card.range{border-left:4px solid #9575cd;}
.time{font-weight:bold;font-size:15px;}
.pending-hint{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;}

.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.85);
  color:white;
  font-size:22px;
  z-index:9999;
  animation:fadeIn 0.2s;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<div id="snow"></div>

<div class="container">

<h2>2743官職予約</h2>

<!-- 入力欄をカードで囲む -->
<div class="card">
  <div class="inputRow">
    <input id="name" placeholder="名前">
    <input id="accel" type="number" placeholder="加速(日)" style="max-width:100px">
  </div>
  <select id="alliance"></select>
</div>

<button id="toggleBtn">空き枠のみ表示：OFF</button>

<h3>時間指定予約</h3>
<div class="card">
  <select id="time"></select>
  <button id="singleBtn">予約</button>
</div>

<h3>範囲指定予約（最大2つ）</h3>
<div class="card">
  ① <select class="start"></select> 〜 <select class="end"></select>
</div>
<div class="card">
  ②（任意）
  <select class="start"><option value="">未選択</option></select>
  〜
  <select class="end"><option value="">未選択</option></select>
</div>
<button id="rangeBtn">範囲指定予約</button>

<h3>予約リスト</h3>
<div id="list"></div>

</div>

<div class="overlay" id="loading">送信中...</div>

<script>
const API="https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";

let currentData=[];
let showOnlyFree=false;

const nameEl=document.getElementById("name");
const accelEl=document.getElementById("accel");
const allianceEl=document.getElementById("alliance");
const timeEl=document.getElementById("time");
const list=document.getElementById("list");
const loading=document.getElementById("loading");
const singleBtn=document.getElementById("singleBtn");
const rangeBtn=document.getElementById("rangeBtn");
const toggleBtn=document.getElementById("toggleBtn");
const startEls=document.querySelectorAll(".start");
const endEls=document.querySelectorAll(".end");

// 名前・加速をlocalStorageで保持
if(localStorage.getItem("rsv_name")) nameEl.value=localStorage.getItem("rsv_name");
if(localStorage.getItem("rsv_accel")) accelEl.value=localStorage.getItem("rsv_accel");
nameEl.oninput=()=>localStorage.setItem("rsv_name",nameEl.value);
accelEl.oninput=()=>localStorage.setItem("rsv_accel",accelEl.value);

["GNt","RAK","mNt","WNK","SBR","OMG","AAA","KOA","ANA","MOF","Gao","bTq","MPO","その他"]
.forEach(a=>allianceEl.add(new Option(a,a)));

function generateTimes(){
  let h=9,m=0,t=[];
  for(let i=0;i<48;i++){
    t.push(("0"+h).slice(-2)+":"+("0"+m).slice(-2));
    m+=30;if(m>=60){m=0;h++;}if(h>=24)h-=24;
  }
  return t;
}
const times=generateTimes();
function getUsed(){return currentData.map(d=>d.time);}

toggleBtn.onclick=()=>{
  showOnlyFree=!showOnlyFree;
  toggleBtn.textContent="空き枠のみ表示："+(showOnlyFree?"ON":"OFF");
  toggleBtn.classList.toggle("active",showOnlyFree);
  updateAll();
};

// 変更後
let lastTimeOptions = "";

function updateTimeOptions(){
  const used = getUsed();
  const key = times.filter(v => !(showOnlyFree && used.includes(v))).join(",");

  // 前回と同じなら再構築しない
  if(key === lastTimeOptions) return;
  lastTimeOptions = key;

  const selected = timeEl.value;
  timeEl.innerHTML = "";
  times.forEach(v => {
    if(showOnlyFree && used.includes(v)) return;
    timeEl.add(new Option(v, v));
  });
  if(selected) timeEl.value = selected;
}

function updateRangeOptions(){
  const used=getUsed();
  startEls.forEach((s,i)=>{
    const selS=s.value, selE=endEls[i].value;
    s.innerHTML="";
    if(i===1) s.add(new Option("未選択",""));
    times.forEach(t=>{
      if(showOnlyFree && used.includes(t)) return;
      s.add(new Option(t,t));
    });
    if(selS) s.value=selS;
    updateEnd(s,endEls[i]);
    if(selE) endEls[i].value=selE;
  });
}

function updateEnd(startSel,endSel){
  if(!startSel.value){
    endSel.innerHTML="";
    endSel.add(new Option("未選択",""));
    return;
  }
  endSel.innerHTML="";
  let idx=times.indexOf(startSel.value);
  for(let i=idx+1;i<times.length;i++) endSel.add(new Option(times[i],times[i]));
}

function checkReady(){
  const used=getUsed();
 singleBtn.classList.toggle("ready",
  nameEl.value.trim() && accelEl.value>0 && timeEl.value  // ← 埋まってても押せる
);
  let hasRange=false, hasFree=false;
  startEls.forEach((s,i)=>{
    if(s.value && endEls[i].value){
      hasRange=true;
      const sIdx=times.indexOf(s.value), eIdx=times.indexOf(endEls[i].value);
      for(let j=sIdx;j<eIdx;j++){
        if(!used.includes(times[j])){hasFree=true;break;}
      }
    }
  });
rangeBtn.classList.toggle("ready",
  nameEl.value.trim() && accelEl.value>0 && hasRange
);
}

function showLoading(v){
  loading.style.display=v?"flex":"none";
  loading.innerText="送信中...";
  loading.style.color="white";
}
function showSuccess(){
  loading.innerText="予約完了！";
  loading.style.color="#00e676";
}

singleBtn.onclick = async () => {
  if(!singleBtn.classList.contains("ready")) return;

  if(getUsed().includes(timeEl.value)){
    alert(`${timeEl.value} はすでに埋まっています`);
    load();
    return;
  }

  showLoading(true);
  const res = await fetch(API, {method:"POST", body: new URLSearchParams({data: JSON.stringify({
    type:"single", time:timeEl.value,
    name:nameEl.value, alliance:allianceEl.value, accel:accelEl.value
  })})});
  const text = await res.text();

  if(text === "duplicate"){
    showLoading(false);
    alert(`${timeEl.value} はすでに埋まっています`);
    load();
    return;
  }
  if(text !== "ok"){showLoading(false); alert("予約失敗"); return;}
  showSuccess();
  setTimeout(()=>{showLoading(false); load();}, 1200);
};

rangeBtn.onclick=async()=>{
  if(!rangeBtn.classList.contains("ready")) return;
  let ranges=[];
  startEls.forEach((s,i)=>{
    if(s.value && endEls[i].value) ranges.push({start:s.value,end:endEls[i].value});
  });
  showLoading(true);
  const res=await fetch(API,{method:"POST",body:new URLSearchParams({data:JSON.stringify({
    type:"range",ranges,
    name:nameEl.value,alliance:allianceEl.value,accel:accelEl.value
  })})});
  const text=await res.text();
  if(text === "duplicate"){
  showLoading(false);
  alert("選択した時間帯はすべて埋まっています");
  load();
  return;
}
if(text === "invalid"){
  showLoading(false);
  alert("有効な時間帯を選択してください");
  return;
}
if(text !== "ok"){showLoading(false); alert("予約失敗"); return;}
  showSuccess();
  setTimeout(()=>{showLoading(false);load();},1200);
};

function createSnow(){
  const container = document.getElementById("snow");

  // 結晶の形を6種類SVGで定義
  const crystals = [
    // 6本腕の基本結晶
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 24 24">
      <g stroke="white" stroke-linecap="round">
        <line x1="0" y1="-10" x2="0" y2="10" stroke-width="1.2"/>
        <line x1="-8.66" y1="-5" x2="8.66" y2="5" stroke-width="1.2"/>
        <line x1="-8.66" y1="5" x2="8.66" y2="-5" stroke-width="1.2"/>
        <line x1="0" y1="-10" x2="-3" y2="-7" stroke-width="0.8"/>
        <line x1="0" y1="-10" x2="3" y2="-7" stroke-width="0.8"/>
        <line x1="0" y1="10" x2="-3" y2="7" stroke-width="0.8"/>
        <line x1="0" y1="10" x2="3" y2="7" stroke-width="0.8"/>
        <line x1="-8.66" y1="-5" x2="-7" y2="-8" stroke-width="0.8"/>
        <line x1="-8.66" y1="-5" x2="-6" y2="-2" stroke-width="0.8"/>
        <line x1="8.66" y1="5" x2="7" y2="8" stroke-width="0.8"/>
        <line x1="8.66" y1="5" x2="6" y2="2" stroke-width="0.8"/>
      </g>
    </svg>`,
    // 枝付き結晶
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 24 24">
      <g stroke="white" stroke-linecap="round">
        <line x1="0" y1="-11" x2="0" y2="11" stroke-width="1.4"/>
        <line x1="-9.5" y1="-5.5" x2="9.5" y2="5.5" stroke-width="1.4"/>
        <line x1="-9.5" y1="5.5" x2="9.5" y2="-5.5" stroke-width="1.4"/>
        <line x1="0" y1="-6" x2="-4" y2="-8" stroke-width="0.9"/>
        <line x1="0" y1="-6" x2="4" y2="-8" stroke-width="0.9"/>
        <line x1="0" y1="6" x2="-4" y2="8" stroke-width="0.9"/>
        <line x1="0" y1="6" x2="4" y2="8" stroke-width="0.9"/>
        <line x1="-5" y1="-3" x2="-7.5" y2="-7" stroke-width="0.9"/>
        <line x1="-5" y1="-3" x2="-3" y2="-1" stroke-width="0.9"/>
        <line x1="5" y1="3" x2="7.5" y2="7" stroke-width="0.9"/>
        <line x1="5" y1="3" x2="3" y2="1" stroke-width="0.9"/>
      </g>
    </svg>`,
    // シンプル細め
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 20 20">
      <g stroke="white" stroke-linecap="round" stroke-width="1">
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-7.8" y1="-4.5" x2="7.8" y2="4.5"/>
        <line x1="-7.8" y1="4.5" x2="7.8" y2="-4.5"/>
        <line x1="-2.5" y1="-5" x2="2.5" y2="-5" stroke-width="0.7"/>
        <line x1="-2.5" y1="5" x2="2.5" y2="5" stroke-width="0.7"/>
        <line x1="-6" y1="-1" x2="-6" y2="1" stroke-width="0.7"/>
        <line x1="6" y1="-1" x2="6" y2="1" stroke-width="0.7"/>
      </g>
    </svg>`,
    // 小さい丸付き
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 24 24">
      <g stroke="white" stroke-linecap="round">
        <line x1="0" y1="-10" x2="0" y2="10" stroke-width="1.2"/>
        <line x1="-8.66" y1="-5" x2="8.66" y2="5" stroke-width="1.2"/>
        <line x1="-8.66" y1="5" x2="8.66" y2="-5" stroke-width="1.2"/>
        <circle cx="0" cy="-10" r="1.5" fill="white" stroke="none"/>
        <circle cx="0" cy="10" r="1.5" fill="white" stroke="none"/>
        <circle cx="-8.66" cy="-5" r="1.5" fill="white" stroke="none"/>
        <circle cx="8.66" cy="5" r="1.5" fill="white" stroke="none"/>
        <circle cx="-8.66" cy="5" r="1.5" fill="white" stroke="none"/>
        <circle cx="8.66" cy="-5" r="1.5" fill="white" stroke="none"/>
        <circle cx="0" cy="0" r="2" fill="white" stroke="none"/>
      </g>
    </svg>`,
  ];

  for(let i = 0; i < 50; i++){
    const el = document.createElement("div");
    el.className = "snowflake";

    const size     = Math.random() * 18 + 10;   // 10〜28px
    const duration = Math.random() * 10 + 8;    // 8〜18秒
    const delay    = Math.random() * 15;
    const drift    = (Math.random() - 0.5) * 150;
    const spin     = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 360 + 180) + "deg";
    const shape    = crystals[Math.floor(Math.random() * crystals.length)];

    el.style.cssText = `
      left:${Math.random() * 100}vw;
      width:${size}px;
      height:${size}px;
      animation-duration:${duration}s;
      animation-delay:-${delay}s;
      --drift:${drift}px;
      --spin:${spin};
      opacity:${Math.random() * 0.5 + 0.3};
    `;
    el.innerHTML = shape;
    container.appendChild(el);
  }
}

async function load(){
  // キャッシュがあれば即表示
  const cached = localStorage.getItem("rsv_cache");
  if(cached && !currentData.length){
    currentData = JSON.parse(cached);
    renderList(currentData);
    updateAll();
  }

  const res  = await fetch(API);
  const data = await res.json();
  currentData = data;
  localStorage.setItem("rsv_cache", JSON.stringify(data));
  renderList(data);
  updateAll();
  checkReady();
}

function renderList(data){
  list.innerHTML = data.map(d => {
    let hint = "";
    if(d.status === "pending" && d.candidates){
      try {
        const ts = JSON.parse(d.candidates);
        hint = `<div class="pending-hint">${ts.join("  /  ")}</div>`;
      } catch(e){}
    }
    return `
    <div class="list-card ${d.type === "range" ? "range" : "single"}">
      <div>
        <div class="time">${d.time || "調整中"}</div>
        ${hint}
      </div>
      <div>${d.name || ""}</div>
    </div>`;
  }).join("");
}

setInterval(load,3000);
setInterval(checkReady,300);
createSnow();
load();

function updateAll(){
  updateTimeOptions();
  updateRangeOptions();
}
</script>
</body>
</html>
