<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  color:white;
  font-family:"Trebuchet MS",sans-serif;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.1), transparent 40%),
    linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  transition:0.2s;
}

body::before{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(3px);
}

#snow{position:fixed;width:100%;height:100%;pointer-events:none;}

.snowflake{
  position:absolute;
  top:-10px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}

/* 🔥 ロゴ（なじませ版） */
.logo{
  position:absolute; /* ← スクロールで流れる */
  top:10px;
  left:10px;
  width:70px;
  z-index:1;

  opacity:0.7;
  filter:brightness(0.9) saturate(0.8);
  mix-blend-mode:screen; /* ← 透明感 */

  pointer-events:none;
}

.container{position:relative;z-index:2;padding:10px;}

h2{text-align:center;color:#e0f7fa;text-shadow:0 0 10px #00e5ff;}

.inputRow{
  display:flex;
  gap:5px;
}

.inputRow input{
  flex:1;
  padding:8px;
}

input,select,button{
  margin:5px 0;
  border-radius:10px;
  border:none;
}

select,button{
  padding:10px;
  width:100%;
}

button{
  background:#263238;
  color:white;
  transition:0.1s;
}

button:active{transform:scale(0.95);}
button:disabled{background:#555;color:#aaa;}

button.active{
  background:#00e5ff;
  color:black;
}

.card{
  background:rgba(0,0,0,0.5);
  border-radius:12px;
  padding:10px;
  margin:8px 0;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-left:4px solid transparent;
}

.single{
  border-left-color:#4fc3f7;
  background:rgba(79,195,247,0.08);
}

.range{
  border-left-color:#9575cd;
  background:rgba(149,117,205,0.08);
}

.time{
  font-size:17px;
  font-weight:bold;
  color:#e0f7fa;
}

.name{
  font-size:14px;
  opacity:0.85;
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
font-size:20px;
z-index:9999;
}
</style>
</head>

<body>

<div id="snow"></div>

<!-- 🔥 ロゴ -->
<img src="unnamed.png" class="logo">

<div class="container">

<h2>2743官職予約</h2>

<div class="inputRow">
  <input id="name" placeholder="名前">
  <input id="accel" type="number" placeholder="加速(日)">
</div>

<select id="alliance"></select>

<button id="toggleBtn">空き枠のみ：OFF</button>

<h3>時間指定予約</h3>
<select id="time"></select>
<button id="singleBtn">予約</button>

<h3>範囲指定予約（最大2つ）</h3>

<div class="card">① <select class="start"></select> 〜 <select class="end"></select></div>
<div class="card">②（任意） <select class="start"></select> 〜 <select class="end"></select></div>

<button id="rangeBtn">範囲指定予約</button>

<div id="list"></div>

</div>

<div class="overlay" id="loading">
  <span id="loadingText">送信中...</span>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";

let currentData=[];
let showOnlyFree=false;
let prevCount=0;

const nameEl=document.getElementById("name");
const accelEl=document.getElementById("accel");
const allianceEl=document.getElementById("alliance");
const timeEl=document.getElementById("time");
const list=document.getElementById("list");

const singleBtn=document.getElementById("singleBtn");
const rangeBtn=document.getElementById("rangeBtn");
const toggleBtn=document.getElementById("toggleBtn");

const startEls=document.querySelectorAll(".start");
const endEls=document.querySelectorAll(".end");

["GNt","RAK","mNt","WNK","SBR","OMG","AAA","KOA","ANA","MOF","Gao","bTq","MPO","その他"]
.forEach(a=>allianceEl.add(new Option(a,a)));

function generateTimes(){
let h=9,m=0,t=[];
for(let i=0;i<48;i++){
t.push(("0"+h).slice(-2)+":"+("0"+m).slice(-2));
m+=30;if(m>=60){m=0;h++}if(h>=24)h-=24;
}
return t;
}
const times=generateTimes();

function getUsed(){
return currentData.map(d=>d.time);
}

function showLoading(v){
loading.style.display=v?"flex":"none";
loadingText.textContent="送信中...";
singleBtn.disabled=v;
rangeBtn.disabled=v;
}

function showSuccess(){
loadingText.textContent="予約完了！";
loadingText.style.color="#00e676";
}

toggleBtn.onclick=()=>{
showOnlyFree=!showOnlyFree;
toggleBtn.textContent="空き枠のみ："+(showOnlyFree?"ON":"OFF");
toggleBtn.classList.toggle("active",showOnlyFree);
updateAll();
};

function updateTimeOptions(){
timeEl.innerHTML="";
const used=getUsed();
times.forEach(v=>{
if(showOnlyFree && used.includes(v)) return;
timeEl.add(new Option(v,v));
});
}

function updateRangeOptions(){
const used=getUsed();
startEls.forEach((s,i)=>{
s.innerHTML="";
times.forEach(t=>{
if(showOnlyFree && used.includes(t)) return;
s.add(new Option(t,t));
});
updateEnd(s,endEls[i]);
});
}

function updateEnd(startSel,endSel){
endSel.innerHTML="";
let idx=times.indexOf(startSel.value);
for(let i=idx+1;i<times.length;i++){
endSel.add(new Option(times[i],times[i]));
}
}

startEls.forEach((s,i)=>{
s.onchange=()=>updateEnd(s,endEls[i]);
});

// 単発
singleBtn.onclick=async ()=>{
if(!nameEl.value.trim()){alert("名前入力");return;}
if(!accelEl.value || accelEl.value<=0){alert("加速入力");return;}

if(getUsed().includes(timeEl.value)){
alert("この時間は埋まっています");
return;
}

showLoading(true);

const res = await fetch(API,{
method:"POST",
body:new URLSearchParams({
data:JSON.stringify({
type:"single",
time:timeEl.value,
name:nameEl.value,
alliance:allianceEl.value,
accel:accelEl.value
})
})
});

const text = await res.text();

if(text!=="ok"){
showLoading(false);
alert("予約失敗");
return;
}

showSuccess();

setTimeout(()=>{
showLoading(false);
load();
},1500);
};

// 範囲
rangeBtn.onclick=async ()=>{
if(!nameEl.value.trim()){alert("名前入力");return;}
if(!accelEl.value || accelEl.value<=0){alert("加速入力");return;}

let ranges=[];
startEls.forEach((s,i)=>{
if(s.value && endEls[i].value){
ranges.push({start:s.value,end:endEls[i].value});
}
});

if(ranges.length===0){alert("選択して");return;}

const used=getUsed();
let hasFree=false;

for(const r of ranges){
const s=times.indexOf(r.start);
const e=times.indexOf(r.end);
for(let i=s;i<e;i++){
if(!used.includes(times[i])){
hasFree=true;
break;
}
}
}

if(!hasFree){
alert("空き枠がありません");
return;
}

showLoading(true);

const res = await fetch(API,{
method:"POST",
body:new URLSearchParams({
data:JSON.stringify({
type:"range",
ranges:ranges,
name:nameEl.value,
alliance:allianceEl.value,
accel:accelEl.value
})
})
});

const text = await res.text();

if(text!=="ok"){
showLoading(false);
alert("予約失敗");
return;
}

showSuccess();

setTimeout(()=>{
showLoading(false);
load();
},1500);
};

async function load(){
const res=await fetch(API);
const data=await res.json();

if(data.length !== prevCount){
  document.body.style.opacity="0.9";
  setTimeout(()=>document.body.style.opacity="1",150);
}
prevCount = data.length;

currentData=data;

list.innerHTML=data.map(d=>{
const typeClass = d.type==="range"?"range":"single";
return `
<div class="card row ${typeClass}">
  <div class="time">${d.time||"調整中"}</div>
  <div class="name">${d.name||""}</div>
</div>
`;
}).join("");

updateAll();
}

function updateAll(){
updateTimeOptions();
updateRangeOptions();
}

setInterval(load,3000);

function createSnow(){
const s=document.getElementById("snow");
for(let i=0;i<40;i++){
let e=document.createElement("div");
e.className="snowflake";
e.style.left=Math.random()*100+"vw";
e.style.width=e.style.height=(Math.random()*4+2)+"px";
e.style.animationDuration=(Math.random()*5+5)+"s";
s.appendChild(e);
}
}

createSnow();
load();
</script>
</body>
</html>
