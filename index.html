<!DOCTYPE html>
<html>
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K2MC9P9VF7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-K2MC9P9VF7');
</script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  color:white;
  font-family:"Trebuchet MS",sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.1), transparent 40%),
    linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  background-attachment:fixed;
}
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(3px);
  z-index:0;
}

.container{position:relative;z-index:3;padding:10px;}

h2{
  text-align:center;
  color:#e0f7fa;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
}
h3{
  margin:12px 0 4px;
  font-size:14px;
  color:#90caf9;
  letter-spacing:0.5px;
}

input, select{
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
  padding:8px 10px;
  margin:4px 0;
  width:100%;
  box-sizing:border-box;
  font-family:"Trebuchet MS",sans-serif;
  font-size:14px;
}
input::placeholder{color:rgba(255,255,255,0.4);}
select option{background:#1c3140;color:white;}
input:focus, select:focus{
  outline:none;
  border-color:rgba(0,229,255,0.5);
}

button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#555;
  color:#aaa;
  margin:5px 0;
  font-family:"Trebuchet MS",sans-serif;
  font-size:14px;
  transition:0.2s;
  cursor:pointer;
}
button:active{transform:scale(0.95);}
button.ready{
  background:#00e5ff;
  color:black;
  box-shadow:0 0 6px rgba(0,229,255,0.4);
}
button.active{
  background:#00e5ff;
  color:black;
  box-shadow:0 0 8px rgba(0,229,255,0.5);
}

.card{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px 12px;
  margin:6px 0;
}
.card input, .card select{margin:4px 0;}

.inputRow{display:flex;gap:8px;}
.inputRow input{flex:1;}

/* シートタブ */
.sheet-tabs{
  display:flex;
  gap:6px;
  margin:6px 0;
  flex-wrap:wrap;
}
.sheet-tab{
  flex:1;
  padding:8px 6px;
  border-radius:10px;
  font-size:13px;
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.15);
  cursor:pointer;
  transition:0.2s;
  text-align:center;
  font-family:"Trebuchet MS",sans-serif;
}
.sheet-tab.active{
  background:#00e5ff;
  color:black;
  border-color:#00e5ff;
  box-shadow:0 0 6px rgba(0,229,255,0.4);
}

/* 予約リスト */
.list-card{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px 14px;
  margin:6px 0;
}
.list-card.single{border-left:4px solid #4fc3f7;}
.list-card.range{border-left:4px solid #9575cd;}
.list-card.mine{
  border-color:#00e5ff;
  background:rgba(0,229,255,0.08);
}

.list-card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}
.time{font-weight:bold;font-size:15px;}
.mine-label{
  font-size:10px;
  background:rgba(0,229,255,0.2);
  color:#00e5ff;
  border-radius:20px;
  padding:1px 8px;
  margin-left:6px;
}
.pending-hint{
  font-size:11px;
  color:rgba(255,255,255,0.35);
  margin-top:4px;
  line-height:1.6;
  word-break:break-all;
}
.btn-cancel-own{
  background:rgba(255,82,82,0.15);
  color:#ff5252;
  border:1px solid rgba(255,82,82,0.3);
  border-radius:8px;
  padding:4px 10px;
  font-size:11px;
  width:auto;
  margin:6px 0 0;
  cursor:pointer;
}

/* 確認モーダル */
#confirm-modal{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.8);
  z-index:9999;
}
.modal-box{
  background:#1c3140;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:16px;
  padding:24px 20px;
  width:85%;
  max-width:320px;
  text-align:center;
}
.modal-box p{margin:0 0 6px;font-size:15px;}
.modal-box .sub{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.modal-box .sub2{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;margin:0;}
.btn-cancel-modal{background:rgba(255,255,255,0.08);color:white;}
.btn-confirm{background:#00e5ff;color:black;}

.overlay{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);
  color:white;font-size:22px;
  z-index:9999;
  animation:fadeIn 0.2s;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<div class="container">

<h2>2743官職予約</h2>

<!-- シートタブ -->
<div class="sheet-tabs">
  <div class="sheet-tab active" onclick="switchSheet('副執政官（月）', this)">副執政官（月）</div>
  <div class="sheet-tab" onclick="switchSheet('副執政官（火）', this)">副執政官（火）</div>
  <div class="sheet-tab" onclick="switchSheet('教育部長', this)">教育部長</div>
</div>

<div class="card">
  <div class="inputRow">
    <input id="name" placeholder="名前">
    <input id="accel" type="number" placeholder="加速(日)" style="max-width:100px">
  </div>
  <select id="alliance"></select>
</div>

<button id="toggleBtn">空き枠のみ表示：OFF</button>

<h3>時間指定予約</h3>
<div class="card">
  <select id="time"></select>
  <button id="singleBtn">予約</button>
</div>

<h3>範囲指定予約（最大2つ）</h3>
<div class="card">
  ① <select class="start"></select> 〜 <select class="end"></select>
</div>
<div class="card">
  ②（任意）
  <select class="start"><option value="">未選択</option></select>
  〜
  <select class="end"><option value="">未選択</option></select>
</div>
<button id="rangeBtn">範囲指定予約</button>

<h3>予約リスト</h3>
<div id="list"></div>

</div>

<!-- 予約確認モーダル -->
<div id="confirm-modal">
  <div class="modal-box">
    <p id="modal-title">予約の確認</p>
    <div class="sub" id="modal-time"></div>
    <div class="sub2" id="modal-detail"></div>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeConfirmModal()">キャンセル</button>
      <button class="btn-confirm" id="modal-ok-btn">予約する</button>
    </div>
  </div>
</div>

<div class="overlay" id="loading">送信中...</div>

<script>
const API="https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";

let currentData=[];
let showOnlyFree=false;
let currentSheet="副執政官（月）";

const nameEl=document.getElementById("name");
const accelEl=document.getElementById("accel");
const allianceEl=document.getElementById("alliance");
const timeEl=document.getElementById("time");
const list=document.getElementById("list");
const loading=document.getElementById("loading");
const singleBtn=document.getElementById("singleBtn");
const rangeBtn=document.getElementById("rangeBtn");
const toggleBtn=document.getElementById("toggleBtn");
const startEls=document.querySelectorAll(".start");
const endEls=document.querySelectorAll(".end");

if(localStorage.getItem("rsv_name")) nameEl.value=localStorage.getItem("rsv_name");
if(localStorage.getItem("rsv_accel")) accelEl.value=localStorage.getItem("rsv_accel");
nameEl.oninput=()=>localStorage.setItem("rsv_name",nameEl.value);
accelEl.oninput=()=>localStorage.setItem("rsv_accel",accelEl.value);

["GNt","RAK","mNt","WNK","SBR","OMG","AAA","KOA","ANA","MOF","Gao","bTq","MPO","その他"]
.forEach(a=>allianceEl.add(new Option(a,a)));

function generateTimes(){
  let h=9,m=0,t=[];
  for(let i=0;i<48;i++){
    t.push(("0"+h).slice(-2)+":"+("0"+m).slice(-2));
    m+=30;if(m>=60){m=0;h++;}if(h>=24)h-=24;
  }
  return t;
}
const times=generateTimes();
function getUsed(){return currentData.map(d=>d.time);}

// シート切り替え
function switchSheet(name, el){
  currentSheet=name;
  document.querySelectorAll(".sheet-tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  currentData=[];
  lastTimeOptions="";
  lastRangeOptions="";
  load();
}

toggleBtn.onclick=()=>{
  showOnlyFree=!showOnlyFree;
  toggleBtn.textContent="空き枠のみ表示："+(showOnlyFree?"ON":"OFF");
  toggleBtn.classList.toggle("active",showOnlyFree);
  updateAll();
};

let lastTimeOptions="";
function updateTimeOptions(){
  const used=getUsed();
  const key=times.filter(v=>!(showOnlyFree&&used.includes(v))).join(",");
  if(key===lastTimeOptions) return;
  lastTimeOptions=key;
  const selected=timeEl.value;
  timeEl.innerHTML="";
  times.forEach(v=>{
    if(showOnlyFree&&used.includes(v)) return;
    timeEl.add(new Option(v,v));
  });
  if(selected) timeEl.value=selected;
}

let lastRangeOptions="";
function updateRangeOptions(){
  const used=getUsed();
  const key=times.filter(v=>!(showOnlyFree&&used.includes(v))).join(",");
  if(key===lastRangeOptions) return;
  lastRangeOptions=key;
  startEls.forEach((s,i)=>{
    const selS=s.value, selE=endEls[i].value;
    s.innerHTML="";
    if(i===1) s.add(new Option("未選択",""));
    times.forEach(t=>{
      if(showOnlyFree&&used.includes(t)) return;
      s.add(new Option(t,t));
    });
    if(selS) s.value=selS;
    updateEnd(s,endEls[i]);
    if(selE) endEls[i].value=selE;
  });
}

function updateEnd(startSel,endSel){
  if(!startSel.value){
    endSel.innerHTML="";
    endSel.add(new Option("未選択",""));
    return;
  }
  endSel.innerHTML="";
  let idx=times.indexOf(startSel.value);
  for(let i=idx+1;i<times.length;i++) endSel.add(new Option(times[i],times[i]));
}

function checkReady(){
  singleBtn.classList.toggle("ready",
    nameEl.value.trim()&&accelEl.value>0&&timeEl.value
  );
  let hasRange=false;
  startEls.forEach((s,i)=>{
    if(s.value&&endEls[i].value) hasRange=true;
  });
  rangeBtn.classList.toggle("ready",
    nameEl.value.trim()&&accelEl.value>0&&hasRange
  );
}

function showLoading(v){
  loading.style.display=v?"flex":"none";
  loading.innerText="送信中...";
  loading.style.color="white";
}
function showSuccess(){
  loading.innerText="予約完了！";
  loading.style.color="#00e676";
}

function validateInputs(){
  let msg=[];
  if(!nameEl.value.trim()) msg.push("名前");
  if(!accelEl.value||accelEl.value<=0) msg.push("加速");
  if(msg.length>0){alert(`${msg.join("と")}を入力してください`);return false;}
  return true;
}

// ===== 確認モーダル =====
let pendingAction=null;

function showConfirmModal(title, time, detail, action){
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-time").textContent=time;
  document.getElementById("modal-detail").textContent=detail;
  document.getElementById("modal-ok-btn").onclick=()=>{
    closeConfirmModal();
    action();
  };
  document.getElementById("confirm-modal").style.display="flex";
}

function closeConfirmModal(){
  document.getElementById("confirm-modal").style.display="none";
}

// ===== 単発予約 =====
singleBtn.onclick=async()=>{
  if(!validateInputs()) return;
  if(!singleBtn.classList.contains("ready")) return;

  if(getUsed().includes(timeEl.value)){
    alert(`${timeEl.value} はすでに埋まっています`);
    load();
    return;
  }

  showConfirmModal(
    "予約の確認",
    timeEl.value,
    `${nameEl.value}　${allianceEl.value}　加速${accelEl.value}日`,
    execSingle
  );
};

async function execSingle(){
  showLoading(true);
  const res=await fetch(API,{
    method:"POST",
    body:new URLSearchParams({data:JSON.stringify({
      type:"single",
      sheet:currentSheet,
      time:timeEl.value,
      name:nameEl.value,
      alliance:allianceEl.value,
      accel:accelEl.value
    })})
  });
  const text=await res.text();
  if(text==="duplicate"){showLoading(false);alert(`${timeEl.value} はすでに埋まっています`);load();return;}
  if(text==="busy"){showLoading(false);alert("アクセスが集中しています。もう一度お試しください");return;}
  if(text!=="ok"){showLoading(false);alert("予約失敗: "+text);return;}
  showSuccess();
  setTimeout(()=>{showLoading(false);load();},1200);
}

// ===== 範囲予約 =====
rangeBtn.onclick=async()=>{
  if(!validateInputs()) return;
  if(!rangeBtn.classList.contains("ready")) return;

  let ranges=[];
  startEls.forEach((s,i)=>{
    if(s.value&&endEls[i].value) ranges.push({start:s.value,end:endEls[i].value});
  });

  const rangeStr=ranges.map(r=>`${r.start}〜${r.end}`).join("、");
  showConfirmModal(
    "範囲指定予約の確認",
    rangeStr,
    `${nameEl.value}　${allianceEl.value}　加速${accelEl.value}日`,
    ()=>execRange(ranges)
  );
};

async function execRange(ranges){
  showLoading(true);
  const res=await fetch(API,{
    method:"POST",
    body:new URLSearchParams({data:JSON.stringify({
      type:"range",
      sheet:currentSheet,
      ranges,
      name:nameEl.value,
      alliance:allianceEl.value,
      accel:accelEl.value
    })})
  });
  const text=await res.text();
  if(text==="duplicate"){showLoading(false);alert("選択した時間帯はすべて埋まっています");load();return;}
  if(text==="invalid"){showLoading(false);alert("有効な時間帯を選択してください");return;}
  if(text==="busy"){showLoading(false);alert("アクセスが集中しています。もう一度お試しください");return;}
  if(text!=="ok"){showLoading(false);alert("予約失敗: "+text);return;}
  showSuccess();
  setTimeout(()=>{showLoading(false);load();},1200);
}

// ===== 自分の予約キャンセル =====
async function cancelOwn(dataStr){
  const target=JSON.parse(decodeURIComponent(dataStr));
  if(!confirm(`「${target.time||"調整中"}」の予約をキャンセルしますか？`)) return;

  showLoading(true);
  const res=await fetch(API,{
    method:"POST",
    body:new URLSearchParams({data:JSON.stringify({
      type:"delete",
      sheet:currentSheet,
      password:"1232",
      time:target.time,
      name:target.name,
      status:target.status
    })})
  });
  const text=await res.text();
  showLoading(false);
  if(text!=="ok"){alert("キャンセル失敗: "+text);return;}
  load();
}

async function load(){
  const cached=localStorage.getItem("rsv_cache");
  if(cached&&!currentData.length){
    currentData=JSON.parse(cached);
    renderList(currentData);
    updateAll();
  }
  try{
    const res=await fetch(API+"?sheet="+encodeURIComponent(currentSheet));
    const text=await res.text();
    const data=JSON.parse(text);
    currentData=data;
    localStorage.setItem("rsv_cache",JSON.stringify(data));
    renderList(data);
    updateAll();
    checkReady();
  }catch(e){
    console.log("取得失敗:",e);
  }
}

function renderList(data){
  const myName=(localStorage.getItem("rsv_name")||"").trim();
  list.innerHTML=data.map(d=>{
    const ismine=myName&&d.name===myName;
    let hint="";
    if(d.status==="pending"&&d.candidates){
      try{
        const ts=JSON.parse(d.candidates);
        hint=`<div class="pending-hint">${ts.join(" / ")}</div>`;
      }catch(e){}
    }
    const dataStr=encodeURIComponent(JSON.stringify({
      time:d.time||"",
      name:d.name||"",
      status:d.status||""
    }));
    const cancelBtn=ismine
      ? `<button class="btn-cancel-own" onclick="cancelOwn('${dataStr}')">キャンセル</button>`
      : "";
    return `
    <div class="list-card ${d.type==="range"?"range":"single"}${ismine?" mine":""}">
      <div class="list-card-header">
        <div>
          <span class="time">${d.time||"調整中"}</span>
          ${ismine?`<span class="mine-label">自分</span>`:""}
        </div>
        <div>${d.name||""}</div>
      </div>
      ${hint}
      ${cancelBtn}
    </div>`;
  }).join("");
}

function scheduleNext(){
  const interval = 20000 + Math.random() * 10000;
  setTimeout(async()=>{
    await load();
    scheduleNext();
  },interval);
}

setInterval(checkReady,300);
load();
scheduleNext();
startEls.forEach((s, i) => {
  s.onchange = () => {
    const selE = endEls[i].value;
    updateEnd(s, endEls[i]);
    if(selE) endEls[i].value = selE;
  };
});

load();
scheduleNext();
function updateAll(){
  updateTimeOptions();
  updateRangeOptions();
}
</script>
</body>
</html>
