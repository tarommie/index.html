<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family:sans-serif; background:#121212; color:#e0e0e0; margin:0; }
.header { background:#1f1f1f; color:#00e5ff; padding:15px; text-align:center; }

.input-area { display:flex; gap:5px; padding:10px; }
input,select {
  flex:1;
  padding:10px;
  background:#2a2a2a;
  border:1px solid #444;
  color:white;
  border-radius:8px;
}

.container { padding:10px; }

.card {
  background:#1e1e1e;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border-left:6px solid #444;
}

.btn {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.free { background:#00c853; }
.full { background:#555; }

#filterBtn {
  width:100%;
  padding:10px;
  background:#263238;
  color:white;
  border:none;
}

/* 🔥 送信中オーバーレイ */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  font-size:22px;
  font-weight:bold;
  color:#00ff9c;
}
</style>
</head>

<body>

<div class="header">予約システム</div>

<div class="input-area">
<input id="nameInput" placeholder="名前">
<select id="allianceSelect"></select>
</div>

<button onclick="toggleEmpty()" id="filterBtn">空きだけ表示</button>

<div class="container" id="list"></div>

<!-- 🔥 送信中表示 -->
<div class="overlay" id="loading">送信中...</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";

const ALLIANCES=["GNt","RAK","mNt","WNK","OMG","SBR","AAA","ANA","KOA","MOF","Gao","bTQ","MPO","その他"];

const COLORS={
GNt:"#ff5252",RAK:"#448aff",mNt:"#e040fb",WNK:"#536dfe",
OMG:"#00bfa5",SBR:"#ff6e40",AAA:"#8d6e63",ANA:"#00e5ff",
KOA:"#76ff03",MOF:"#c6ff00",Gao:"#7c4dff",bTQ:"#ff4081",
MPO:"#78909c","その他":"#9e9e9e"
};

// ===== 入力 =====
const nameInput=document.getElementById("nameInput");
const allianceSelect=document.getElementById("allianceSelect");

ALLIANCES.forEach(a=>{
  let o=document.createElement("option");
  o.value=o.text=a;
  allianceSelect.appendChild(o);
});

// 保存
nameInput.value=localStorage.getItem("name")||"";
allianceSelect.value=localStorage.getItem("alliance")||ALLIANCES[0];

nameInput.onchange=e=>localStorage.setItem("name",e.target.value);
allianceSelect.onchange=e=>localStorage.setItem("alliance",e.target.value);

// ===== 状態 =====
let latestData=[];
let showEmptyOnly=false;

// ===== 読み込み =====
async function load(){
  const res=await fetch(API_URL);
  const data=await res.json();
  latestData=data;

  const list=document.getElementById("list");
  list.innerHTML="";

  generateTimes().forEach(t=>{
    const found=data.find(d=>d.time===t);
    if(showEmptyOnly&&found)return;

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<div>${t}</div>`;

    const btn=document.createElement("button");
    btn.className="btn";

    if(found){
      card.innerHTML+=`<div>${found.name}（${found.alliance}）</div>`;
      btn.innerText="予約不可";
      btn.classList.add("full");
      btn.disabled=true;
      card.style.borderLeft="6px solid "+(COLORS[found.alliance]||"#444");
    }else{
      card.innerHTML+=`<div>空き</div>`;
      btn.innerText="予約する";
      btn.classList.add("free");
      btn.onclick=()=>reserve(t);
    }

    card.appendChild(btn);
    list.appendChild(card);
  });
}

// ===== 予約 =====
function reserve(time){
  const name=nameInput.value;
  const alliance=allianceSelect.value;

  if(!name){
    alert("名前入力");
    return;
  }

  // 🔥 オーバーレイ表示（確実）
  const overlay=document.getElementById("loading");
  overlay.style.display="flex";

  fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({time,name,alliance})
  });

  // 🔄 少し待って更新
  setTimeout(()=>{
    overlay.style.display="none";
    load();
  },1500);
}

// ===== フィルター =====
function toggleEmpty(){
  showEmptyOnly=!showEmptyOnly;
  document.getElementById("filterBtn").innerText=
    showEmptyOnly?"全て表示":"空きだけ表示";
  load();
}

// ===== 時間生成 =====
function generateTimes(){
  let times=[],h=9,m=0;
  for(let i=0;i<48;i++){
    let nh=h,nm=m+30;
    if(nm>=60){nm=0;nh++;}
    if(nh>=24)nh-=24;

    times.push(
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}-`+
      `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`
    );

    h=nh;m=nm;
  }
  return times;
}

// ===== 起動 =====
setInterval(load,5000);
load();
</script>

</body>
</html>
