<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K2MC9P9VF7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-K2MC9P9VF7');
</script>
<style>
*{box-sizing:border-box;}
body{
  margin:0;
  color:white;
  font-family:"Trebuchet MS",sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
}

#pw-screen{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:14px;
  padding:20px;
}
#pw-screen h2{margin:0;color:#e0f7fa;letter-spacing:1px;}
#pw-screen input{
  width:100%;
  max-width:280px;
  padding:12px 16px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:16px;
  text-align:center;
  letter-spacing:3px;
}
#pw-screen input::placeholder{letter-spacing:0;color:rgba(255,255,255,0.35);}
#pw-error{color:#ff5252;font-size:13px;min-height:18px;}

#main-screen{display:none;padding:16px;}

h2{
  text-align:center;
  color:#e0f7fa;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
  margin:8px 0 16px;
}
h3{font-size:14px;color:#90caf9;margin:16px 0 6px;}

input, select{
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
  padding:8px 10px;
  margin:4px 0;
  width:100%;
  box-sizing:border-box;
  font-family:"Trebuchet MS",sans-serif;
  font-size:14px;
}
select option{background:#1c3140;color:white;}

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  font-family:"Trebuchet MS",sans-serif;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
}
button:active{transform:scale(0.95);}

.btn-primary{
  background:#00e5ff;
  color:black;
  width:100%;
  box-shadow:0 0 6px rgba(0,229,255,0.4);
}
.btn-delete{
  background:rgba(255,82,82,0.15);
  color:#ff5252;
  border:1px solid rgba(255,82,82,0.3);
  padding:6px 12px;
  font-size:12px;
}
.btn-delete:hover{background:rgba(255,82,82,0.3);}
.btn-logout{
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.15);
  width:100%;
  margin-top:24px;
}

.card{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:12px 14px;
  margin:6px 0;
}

.list-card{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px 14px;
  margin:6px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}
.list-card.single{border-left:4px solid #4fc3f7;}
.list-card.range{border-left:4px solid #9575cd;}

.time{font-weight:bold;font-size:15px;}
.name{font-size:13px;color:rgba(255,255,255,0.7);}
.pending-hint{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;}

.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:bold;}
.badge.confirmed{background:rgba(0,229,255,0.15);color:#00e5ff;}
.badge.pending{background:rgba(255,193,7,0.15);color:#ffc107;}

.count{
  display:inline-block;
  background:rgba(0,229,255,0.15);
  color:#00e5ff;
  border-radius:20px;
  padding:1px 10px;
  font-size:12px;
  margin-left:6px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:8px;
}
.stat-box{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
}
.stat-num{font-size:24px;font-weight:bold;color:#00e5ff;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}

.overlay{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);
  color:white;font-size:22px;
  z-index:9999;
}

#confirm-modal{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.8);
  z-index:9999;
}
.modal-box{
  background:#1c3140;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:16px;
  padding:24px 20px;
  width:85%;
  max-width:320px;
  text-align:center;
}
.modal-box p{margin:0 0 6px;font-size:15px;}
.modal-box .sub{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;}
.btn-cancel{background:rgba(255,255,255,0.08);color:white;}
.btn-confirm-del{background:#ff5252;color:white;}

.sheet-tabs{
  display:flex;
  gap:6px;
  margin-bottom:12px;
  flex-wrap:wrap;
}
.sheet-tab{
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.15);
  cursor:pointer;
  transition:0.2s;
}
.sheet-tab.active{
  background:#00e5ff;
  color:black;
  border-color:#00e5ff;
  box-shadow:0 0 6px rgba(0,229,255,0.4);
}
</style>
</head>
<body>

<!-- パスワード画面 -->
<div id="pw-screen">
  <h2>🔒 管理者ページ</h2>
  <input id="pw-input" type="password" placeholder="パスワードを入力" maxlength="20">
  <div id="pw-error"></div>
  <button class="btn-primary" onclick="checkPassword()">ログイン</button>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <h2>管理者ページ</h2>

  <div class="sheet-tabs">
    <div class="sheet-tab active" onclick="switchSheet('副執政官（月）', this)">副執政官（月）</div>
    <div class="sheet-tab" onclick="switchSheet('副執政官（火）', this)">副執政官（火）</div>
    <div class="sheet-tab" onclick="switchSheet('教育部長', this)">教育部長</div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-num" id="stat-total">-</div>
      <div class="stat-label">総予約数</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-confirmed">-</div>
      <div class="stat-label">確定</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-pending" style="color:#ffc107">-</div>
      <div class="stat-label">調整中</div>
    </div>
  </div>

  <button class="btn-primary" onclick="load()" style="margin-bottom:8px">🔄 更新</button>

  <h3>確定済み <span class="count" id="count-confirmed">0</span></h3>
  <div id="list-confirmed"></div>

  <h3>調整中 <span class="count" id="count-pending">0</span></h3>
  <div id="list-pending"></div>

  <button class="btn-logout" onclick="logout()">ログアウト</button>
</div>

<!-- 削除確認モーダル -->
<div id="confirm-modal">
  <div class="modal-box">
    <p id="modal-msg">この予約を削除しますか？</p>
    <div class="sub" id="modal-sub"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-confirm-del" onclick="executeDelete()">削除</button>
    </div>
  </div>
</div>

<div class="overlay" id="loading"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbylkYrl4A2fYdCIdTZ2KDcXYrf-ihGeMIwHSUCAsBwnX_kVjgmox3cE1m5sgfvES4Hsdg/exec";
const ADMIN_PW = "1232";

let password = "";
let deleteTarget = null;
let currentSheet = "副執政官（月）";

// ===== パスワード =====
document.getElementById("pw-input").addEventListener("keydown", e => {
  if(e.key === "Enter") checkPassword();
});

function checkPassword(){
  const val = document.getElementById("pw-input").value;
  if(val === ADMIN_PW){
    password = val;
    document.getElementById("pw-screen").style.display = "none";
    document.getElementById("main-screen").style.display = "block";
    load();
  } else {
    document.getElementById("pw-error").textContent = "パスワードが違います";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

function logout(){
  password = "";
  document.getElementById("main-screen").style.display = "none";
  document.getElementById("pw-screen").style.display = "flex";
  document.getElementById("pw-input").value = "";
  document.getElementById("pw-error").textContent = "";
}

// ===== シート切り替え =====
function switchSheet(name, el){
  currentSheet = name;
  document.querySelectorAll(".sheet-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  load();
}

// ===== データ読み込み =====
async function load(){
  showLoading("読み込み中...");
  try {
    const res  = await fetch(API + "?sheet=" + encodeURIComponent(currentSheet));
    const text = await res.text();
    const data = JSON.parse(text);
    render(data);
  } catch(e) {
    alert("読み込み失敗: " + e.message);
  }
  hideLoading();
}

function render(data){
  const confirmed = data.filter(d => d.status === "confirmed");
  const pending   = data.filter(d => d.status !== "confirmed");

  document.getElementById("stat-total").textContent      = data.length;
  document.getElementById("stat-confirmed").textContent  = confirmed.length;
  document.getElementById("stat-pending").textContent    = pending.length;
  document.getElementById("count-confirmed").textContent = confirmed.length;
  document.getElementById("count-pending").textContent   = pending.length;

  document.getElementById("list-confirmed").innerHTML = confirmed.length
    ? confirmed.map(d => cardHTML(d)).join("")
    : "<div style='color:rgba(255,255,255,0.3);font-size:13px;padding:8px'>なし</div>";

  document.getElementById("list-pending").innerHTML = pending.length
    ? pending.map(d => cardHTML(d)).join("")
    : "<div style='color:rgba(255,255,255,0.3);font-size:13px;padding:8px'>なし</div>";
}

function cardHTML(d){
  let hint = "";
  if(d.status === "pending" && d.candidates){
    try {
      const ts = JSON.parse(d.candidates);
      hint = `<div class="pending-hint">${ts.join(" / ")}</div>`;
    } catch(e){}
  }
  const badge = d.status === "confirmed"
    ? `<span class="badge confirmed">確定</span>`
    : `<span class="badge pending">調整中</span>`;

  const dataStr = encodeURIComponent(JSON.stringify({
    time:   d.time   || "",
    name:   d.name   || "",
    status: d.status || ""
  }));

  return `
  <div class="list-card ${d.type === "range" ? "range" : "single"}">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="time">${d.time || "調整中"}</div>
        ${badge}
      </div>
      <div class="name">${d.name || ""}　${d.alliance || ""}</div>
      ${hint}
    </div>
    <button class="btn-delete" onclick="confirmDelete('${dataStr}')">削除</button>
  </div>`;
}

// ===== 削除 =====
function confirmDelete(dataStr){
  deleteTarget = JSON.parse(decodeURIComponent(dataStr));
  document.getElementById("modal-msg").textContent = "この予約を削除しますか？";
  document.getElementById("modal-sub").textContent =
    `${deleteTarget.time || "調整中"}　${deleteTarget.name}`;
  document.getElementById("confirm-modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("confirm-modal").style.display = "none";
  deleteTarget = null;
}

async function executeDelete(){
  if(!deleteTarget) return;
  const target = deleteTarget;
  closeModal();
  showLoading("削除中...");

  const res = await fetch(API, {
    method: "POST",
    body: new URLSearchParams({
      data: JSON.stringify({
        type:     "delete",
        sheet:    currentSheet,
        password: password,
        time:     target.time,
        name:     target.name,
        status:   target.status
      })
    })
  });

  const text = await res.text();
  hideLoading();

  if(text === "unauthorized"){
    alert("認証エラー");
    logout();
    return;
  }
  if(text !== "ok"){
    alert("削除失敗: " + text);
    return;
  }
  load();
}

function showLoading(msg){
  const el = document.getElementById("loading");
  el.textContent = msg;
  el.style.display = "flex";
}
function hideLoading(){
  document.getElementById("loading").style.display = "none";
}
</script>
</body>
</html>
